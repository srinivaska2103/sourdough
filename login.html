<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23B45309' stroke-width='2'%3E%3Cpath d='M12 2C8.686 2 6 4.686 6 8c0 1.93.89 3.65 2.29 4.77C7.38 13.9 6.7 15.2 6.7 16.6c0 2.98 2.42 5.4 5.4 5.4s5.4-2.42 5.4-5.4c0-1.4-.68-2.7-1.59-3.83C17.11 11.65 18 9.93 18 8c0-3.314-2.686-6-6-6z'/%3E%3C/svg%3E">
    <title>Login | Sourdough</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        if (localStorage.getItem('dark') === 'true' || (!('dark' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        if (localStorage.getItem('dir') === 'rtl') {
            document.documentElement.setAttribute('dir', 'rtl');
        }
    </script>
</head>
<body class="bg-stone-50 dark:bg-stone-950 text-stone-900 dark:text-stone-50 transition-colors duration-300 min-h-screen flex flex-col justify-between"
      x-data="{ 
          darkMode: localStorage.getItem('dark') === 'true', 
          dir: localStorage.getItem('dir') || 'ltr',
          showPassword: false
      }"
      x-init="
          $watch('darkMode', value => {
              if (value) {
                  document.documentElement.classList.add('dark');
                  localStorage.setItem('dark', 'true');
              } else {
                  document.documentElement.classList.remove('dark');
                  localStorage.setItem('dark', 'false');
              }
          });
          $watch('dir', value => {
              document.documentElement.setAttribute('dir', value);
              localStorage.setItem('dir', value);
          });
      "> <header class="w-full max-w-7xl mx-auto p-4 md:p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="w-8 h-8 bg-amber-700 text-white flex items-center justify-center rounded-lg group-hover:scale-105 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C8.686 2 6 4.686 6 8c0 1.93.89 3.65 2.29 4.77C7.38 13.9 6.7 15.2 6.7 16.6c0 2.98 2.42 5.4 5.4 5.4s5.4-2.42 5.4-5.4c0-1.4-.68-2.7-1.59-3.83C17.11 11.65 18 9.93 18 8c0-3.314-2.686-6-6-6z"/>
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-stone-900 dark:text-stone-50 group-hover:text-amber-700 transition-colors">Sourdough</span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="darkMode = !darkMode" class="p-2 text-stone-600 dark:text-stone-400 hover:bg-stone-200 dark:hover:bg-stone-800 rounded-full transition focus:outline-none" aria-label="Switch Theme">
                <span x-text="darkMode ? '☀️' : '🌙'"></span>
            </button>
            
            <button @click="dir = (dir === 'ltr' ? 'rtl' : 'ltr')" class="text-xs font-bold uppercase p-2 border border-stone-300 dark:border-stone-700 text-stone-700 dark:text-stone-300 hover:bg-stone-200 dark:hover:bg-stone-800 rounded transition focus:outline-none">
                <span x-text="dir === 'ltr' ? 'RTL' : 'LTR'"></span>
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-8 sm:px-6 lg:px-8">
        <div class="w-full max-w-md bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-3xl p-6 sm:p-10 shadow-xl transition-all duration-300">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-semibold tracking-tight text-stone-900 dark:text-stone-50 mb-2">Welcome Back</h1>
                <p class="text-sm text-stone-500 dark:text-stone-400 font-normal">Sign in to manage your sourdough supplies & active subscriptions.</p>
            </div>

            <form action="#" method="POST" class="space-y-5" @submit.prevent>
                <div>
                    <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-stone-600 dark:text-stone-400 mb-1.5">Email Address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required 
                           class="w-full px-4 py-3 border border-stone-300 dark:border-stone-700 bg-transparent text-stone-900 dark:text-stone-50 rounded-xl focus:outline-none focus:border-amber-700 dark:focus:border-amber-700 transition duration-200 text-sm font-normal">
                </div>

             <div x-data="{ showPassword: false, passwordValue: '' }">
    <label for="password"
        class="block text-xs font-semibold uppercase tracking-wider text-stone-600 dark:text-stone-400 mb-1.5">
        Password
    </label>

    <div class="relative">

        <!-- Left lock icon / placeholder -->
        <div x-show="passwordValue.length === 0"
            class="absolute top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none flex items-center gap-2 left-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" stroke="currentColor"
                stroke-width="2" viewBox="0 0 24 24">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <span class="text-sm text-stone-400/70">Enter password</span>
        </div>

        <!-- Input -->
        <input
            :type="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            x-model="passwordValue"
            class="w-full py-3 pl-12 pr-12 border border-stone-300 dark:border-stone-700 bg-transparent
                   text-stone-900 dark:text-stone-50 rounded-xl focus:outline-none
                   focus:border-amber-700 transition text-sm"
        >

        <!-- Eye button INSIDE input -->
        <button type="button"
            @click="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center justify-center
                   w-8 h-8 rounded-md text-stone-500 hover:text-amber-700 hover:bg-stone-100
                   dark:hover:bg-stone-800 transition">

            <!-- open eye -->
            <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>

            <!-- closed eye -->
            <svg x-show="showPassword" x-cloak class="w-5 h-5" fill="none" stroke="currentColor"
                stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>

        </button>
    </div>
</div>

                <div class="flex items-center justify-between text-sm pt-1">
                    <label class="flex items-center gap-2 cursor-pointer text-stone-600 dark:text-stone-400 select-none">
                        <input type="checkbox" name="remember" class="w-4 h-4 rounded border-stone-300 dark:border-stone-700 text-amber-700 accent-amber-700 focus:ring-0">
                        <span class="font-normal text-xs sm:text-sm">Remember me</span>
                    </label>
                    <a href="#" class="text-xs sm:text-sm font-semibold text-amber-700 hover:text-amber-800 transition">Forgot password?</a>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full py-3.5 bg-amber-700 hover:bg-amber-800 text-white font-semibold rounded-xl active:scale-95 transition-all duration-200 shadow-md hover:shadow-lg text-sm text-center">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="relative my-8 text-center">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-stone-200 dark:border-stone-800"></div></div>
                <span class="relative z-10 bg-white dark:bg-stone-900 px-4 text-xs font-medium text-stone-400 dark:text-stone-500 uppercase tracking-widest">Or continue with</span>
            </div>

          <div class="grid grid-cols-3 gap-3">
    <a href="#" class="flex justify-center items-center py-2.5 border border-stone-200 dark:border-stone-800 rounded-xl bg-stone-50 dark:bg-stone-950 hover:bg-stone-100 dark:hover:bg-stone-800 transition duration-200" aria-label="Sign in with Google">
        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
    </a>
    
    <a href="#" class="flex justify-center items-center py-2.5 border border-stone-200 dark:border-stone-800 rounded-xl bg-stone-50 dark:bg-stone-950 hover:bg-stone-100 dark:hover:bg-stone-800 hover:text-[#1877F2] dark:hover:text-[#1877F2] text-stone-500 dark:text-stone-400 transition duration-200" aria-label="Sign in with Facebook">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
    </a>

    <a href="#" class="flex justify-center items-center py-2.5 border border-stone-200 dark:border-stone-800 rounded-xl bg-stone-50 dark:bg-stone-950 hover:bg-stone-100 dark:hover:bg-stone-800 hover:text-black dark:hover:text-white text-stone-500 dark:text-stone-400 transition duration-200" aria-label="Sign in with Apple">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.57 2.95-1.39z"/>
        </svg>
    </a>
</div>

            <div class="text-center mt-8">
                <p class="text-sm font-normal text-stone-500 dark:text-stone-400">
                    Don't have an account? 
                    <a href="signup.html" class="font-semibold text-amber-700 hover:text-amber-800 transition">Create an account</a>
                </p>
            </div>

        </div>
    </main>

    <footer class="w-full py-4 text-center text-xs text-stone-400 dark:text-stone-600 font-normal">
        &copy; 2026 Sourdough. All rights reserved.
    </footer>

</body>
</html>
